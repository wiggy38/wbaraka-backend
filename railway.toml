[build]
builder = "nixpacks"

[deploy]
startCommand = "php artisan migrate --force && php artisan l5-swagger:generate && php artisan optimize && php artisan serve --host=0.0.0.0 --port=8080"
healthcheckPath = "/api/health"
healthcheckTimeout = 30
restartPolicyType = "on_failure"
restartPolicyMaxRetries = 3

[[services]]
internalPort = 8080
